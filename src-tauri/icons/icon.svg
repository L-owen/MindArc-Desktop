<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eaf0"/>
      <stop offset="35%" stop-color="#c8cce0"/>
      <stop offset="65%" stop-color="#2a2060"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="gradV" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="30%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="lightningGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowLightning" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="peakSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="30%" stop-color="#67e8f9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#22d3ee" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bgL)"/>

  <!-- 人 left stroke -->
  <polygon points="248,80 264,80 148,200 132,200" fill="url(#gradV)" filter="url(#glow)"/>
  <!-- 人 right stroke -->
  <polygon points="248,80 264,80 380,200 364,200" fill="url(#gradV)" filter="url(#glow)"/>
  <!-- 今 horizontal stroke -->
  <polygon points="112,210 400,210 400,226 112,226" fill="url(#gradH)" filter="url(#glow)"/>
  <!-- Horizontal highlight -->
  <polygon points="112,210 400,210 400,215 112,215" fill="#ffffff" opacity="0.3"/>

  <!-- ===== 犀利闪电 (centered, replacing 心钩) ===== -->
  <!-- 
    Based on current app icon's lightning: M 250 158 L 246 140 L 256 128 L 252 108
    But MORE SHARP/RUTHLESS:
    - butt linecap (NOT round — round softens tips)
    - miter linejoin (sharp corners)
    - Larger zigzag amplitude for more dramatic angles
    - Same gradient, same glow filter, same white core, same spark at tip
    
    Shape: top → sharp left jog → sharp right jog → bottom tip
    All straight lines, no curves. Maximum sharpness.
  -->

  <!-- 犀利闪电主线: butt linecap for razor-sharp endpoints -->
  <path d="M 256 260 L 234 310 L 278 355 L 256 400"
        stroke="url(#lightningGrad)" stroke-width="8" fill="none"
        stroke-linecap="butt" stroke-linejoin="miter"
        filter="url(#glowLightning)"/>

  <!-- 犀利闪电白色核心线 (inner glow) -->
  <path d="M 256 260 L 235 310 L 277 355 L 256 400"
        stroke="white" stroke-width="2.5" fill="none"
        stroke-linecap="butt" stroke-linejoin="miter" opacity="0.5"/>

  <!-- Spark at bottom tip (same as app) -->
  <circle cx="256" cy="400" r="6" fill="url(#sparkGrad)" filter="url(#glowLightning)" opacity="0.85"/>
  <circle cx="256" cy="400" r="2.5" fill="white" opacity="0.95"/>

  <!-- 心 three dots -->
  <polygon points="148,402 156,394 164,402 156,410" fill="#22d3ee" filter="url(#dotGlow)"/>
  <polygon points="256,440 264,432 272,440 264,448" fill="#6366f1" filter="url(#dotGlow)"/>
  <polygon points="364,402 372,394 380,402 372,410" fill="#a855f7" filter="url(#dotGlow)"/>

  <!-- Peak spark -->
  <circle cx="256" cy="80" r="12" fill="url(#peakSpark)"/>
  <circle cx="256" cy="80" r="4" fill="#ffffff" opacity="0.85"/>
</svg>