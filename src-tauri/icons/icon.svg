<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="spark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#448aff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <linearGradient id="sparkGlowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="40%" stop-color="#448aff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="centerBurst" cx="256" cy="200" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle radial light burst behind spark -->
  <circle cx="256" cy="200" r="160" fill="url(#centerBurst)"/>

  <!-- Decorative orbital ring -->
  <ellipse cx="256" cy="260" rx="190" ry="170" fill="none" stroke="url(#spark)" stroke-width="1" opacity="0.12"/>

  <!-- Main spark shape: a bold angular lightning/neural arc -->
  <!-- This is the core symbol - a zigzag bolt with an "arc" curve -->
  <!-- At small sizes, it reads as a clean lightning bolt silhouette -->
  <g filter="url(#outerGlow)">
    <!-- The main bolt - bold, angular, recognizable at any size -->
    <path d="
      M 232 90
      L 290 90
      L 258 220
      L 320 210
      L 218 422
      L 256 280
      L 192 290
      Z"
      fill="url(#spark)"
      opacity="0.95"
    />
  </g>

  <!-- Bright center highlight on the bolt for depth -->
  <path d="
    M 242 110
    L 278 110
    L 260 210
    L 305 203
    L 240 370
    L 260 272
    L 212 280
    Z"
    fill="white"
    opacity="0.15"
    filter="url(#innerGlow)"
  />

  <!-- Small arc emanation lines (neural connections) -->
  <line x1="195" y1="155" x2="165" y2="130" stroke="#00e5ff" stroke-width="2.5" stroke-linecap="round" opacity="0.5" filter="url(#subtleGlow)"/>
  <line x1="325" y1="165" x2="355" y2="140" stroke="#b388ff" stroke-width="2.5" stroke-linecap="round" opacity="0.5" filter="url(#subtleGlow)"/>
  <line x1="175" y1="290" x2="140" y2="295" stroke="#448aff" stroke-width="2" stroke-linecap="round" opacity="0.35" filter="url(#subtleGlow)"/>
  <line x1="340" y1="280" x2="375" y2="270" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.35" filter="url(#subtleGlow)"/>

  <!-- Neural dot nodes at arc line endpoints -->
  <circle cx="165" cy="130" r="4" fill="#00e5ff" opacity="0.6" filter="url(#subtleGlow)"/>
  <circle cx="355" cy="140" r="4" fill="#b388ff" opacity="0.6" filter="url(#subtleGlow)"/>
  <circle cx="140" cy="295" r="3" fill="#448aff" opacity="0.4" filter="url(#subtleGlow)"/>
  <circle cx="375" cy="270" r="3" fill="#00e5ff" opacity="0.4" filter="url(#subtleGlow)"/>

  <!-- Bottom wave arc - the "arc" in MindArc -->
  <path d="M 140 430 Q 190 405 230 420 Q 260 432 280 418 Q 310 400 372 430"
        fill="none" stroke="url(#spark)" stroke-width="2" stroke-linecap="round"
        opacity="0.35" filter="url(#subtleGlow)"/>
</svg>
