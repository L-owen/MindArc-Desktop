<script>
/* Global handler for reminder button (must be outside IIFE for onclick attribute) */
window._toggleReminder = null;
/* ================================================================
   闪念 — 本地想法记录工具
   所有数据通过 Tauri v2 Plugin API 保存在本地 JSON 文件中
   ================================================================ */

(function() {
  'use strict';

  // ==================== 状态管理 / State ====================
  const APP_STATE_KEY = 'flashmind_file_handle';

  const { open: dialogOpen, save: dialogSave } = window.__TAURI__.dialog;
  const { readTextFile, writeTextFile } = window.__TAURI__.fs;

  let filePath = null;              // 文件路径
  let thoughts = [];                // 想法数据
  let currentFilter = 'all';        // 当前过滤器
  let searchQuery = '';             // 搜索关键词
  let currentPriority = 'q1';      // 当前输入优先级
  let currentPriorityFilter = 'all'; // 当前优先级筛选
  let currentTag = 'Mine';           // 当前输入标签
  let currentTagFilter = 'all';      // 当前标签筛选
  let customTags = [];               // 用户自定义标签
  let currentView = 'list';          // 当前视图: 'list' | 'tags'
  let currentReminder = { enabled: false, datetime: null, repeat: 'none' };
  let reminderEngineInterval = null;

  // ==================== 提醒引擎 / Reminder Engine ====================

  const REMINDER_CHECK_INTERVAL = 30000; // 30 seconds

  /** Request notification permission on startup */
  async function requestNotificationPermission() {
    try {
      if (!window.__TAURI__ || !window.__TAURI__.notification) return false;
      const notif = window.__TAURI__.notification;
      let granted = await notif.isPermissionGranted();
      if (!granted) {
        const permission = await notif.requestPermission();
        granted = permission === 'granted';
      }
      return granted;
    } catch (e) {
      console.warn('Notification permission error:', e);
      return false;
    }
  }

  /** Calculate next trigger datetime based on repeat pattern */
  function calculateNextReminder(isoStr, repeat) {
    const d = new Date(isoStr);
    if (repeat === 'daily') {
      d.setDate(d.getDate() + 1);
    } else if (repeat === 'weekly') {
      d.setDate(d.getDate() + 7);
    } else if (repeat === 'monthly') {
      d.setMonth(d.getMonth() + 1);
    }
    return d.toISOString();
  }

  /** Send a system notification (defensive) */
  function sendSystemNotification(title, body) {
    try {
      if (window.__TAURI__ && window.__TAURI__.notification && window.__TAURI__.notification.sendNotification) {
        window.__TAURI__.notification.sendNotification({ title: title, body: body });
      }
    } catch (e) {
      console.warn('Failed to send notification:', e);
    }
  }

  /** Main reminder check loop */
  function checkReminders() {
    const now = new Date();
    let needsSave = false;

    thoughts.forEach(t => {
      if (!t.reminder || !t.reminder.enabled || !t.reminder.datetime) return;
      if (t.completedAt) return; // skip completed thoughts

      const triggerTime = new Date(t.reminder.datetime);
      if (triggerTime <= now) {
        // Fire notification
        sendSystemNotification('闪念提醒', t.content);

        if (t.reminder.repeat && t.reminder.repeat !== 'none') {
          // Calculate next trigger, ensure it's in the future
          let next = calculateNextReminder(t.reminder.datetime, t.reminder.repeat);
          while (new Date(next) <= now) {
            next = calculateNextReminder(next, t.reminder.repeat);
          }
          t.reminder.datetime = next;
        } else {
          t.reminder.enabled = false;
        }
        needsSave = true;
      }
    });

    if (needsSave) {
      saveData();
      render();
    }
  }

  /** Start the reminder engine */
  function startReminderEngine() {
    if (reminderEngineInterval) clearInterval(reminderEngineInterval);
    requestNotificationPermission();
    checkReminders(); // immediate first check
    reminderEngineInterval = setInterval(checkReminders, REMINDER_CHECK_INTERVAL);
  }

  /** Format reminder datetime for display in cards */
  function formatReminderDisplay(reminder) {
    if (!reminder || !reminder.datetime) return '';
    const d = new Date(reminder.datetime);
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    const da = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    const repeatLabels = { none: '', daily: '每天', weekly: '每周', monthly: '每月' };
    const prefix = repeatLabels[reminder.repeat || 'none'] || '';
    if (prefix) return prefix + ' ' + h + ':' + mi;
    return mo + '-' + da + ' ' + h + ':' + mi;
  }

  /** Show reminder editor popup for a specific thought */
  function showReminderEditor(anchorEl, thought) {
    closePopup();

    const popup = document.createElement('div');
    popup.className = 'card-popup reminder-editor-popup';
    popup.style.minWidth = '220px';
    popup.style.padding = '10px';

    // Ensure reminder exists
    if (!thought.reminder) {
      thought.reminder = { enabled: false, datetime: null, repeat: 'none' };
    }

    // Header
    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.8rem;color:var(--accent-cyan);margin-bottom:8px;font-weight:600;letter-spacing:0.05em;';
    header.textContent = '⏰ 提醒设置';
    popup.appendChild(header);

    // Toggle row
    const toggleRow = document.createElement('div');
    toggleRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
    const toggleLabel = document.createElement('span');
    toggleLabel.style.cssText = 'font-size:0.78rem;color:var(--text-primary);';
    toggleLabel.textContent = '开启提醒';
    const toggleSwitch = document.createElement('label');
    toggleSwitch.className = 'reminder-toggle';
    const toggleInput = document.createElement('input');
    toggleInput.type = 'checkbox';
    toggleInput.checked = thought.reminder.enabled;
    const toggleSlider = document.createElement('span');
    toggleSlider.className = 'reminder-toggle-slider';
    toggleSwitch.appendChild(toggleInput);
    toggleSwitch.appendChild(toggleSlider);
    toggleRow.appendChild(toggleLabel);
    toggleRow.appendChild(toggleSwitch);
    popup.appendChild(toggleRow);

    // Datetime input
    const dtRow = document.createElement('div');
    dtRow.style.cssText = 'margin-bottom:8px;';
    const dtInput = document.createElement('input');
    dtInput.type = 'datetime-local';
    dtInput.className = 'reminder-datetime-input';
    if (thought.reminder.datetime) {
      // Convert to local datetime-local format
      const d = new Date(thought.reminder.datetime);
      const localStr = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      dtInput.value = localStr;
    }
    dtRow.appendChild(dtInput);
    popup.appendChild(dtRow);

    // Repeat selector
    const repeatRow = document.createElement('div');
    repeatRow.style.cssText = 'margin-bottom:8px;';
    const repeatSelect = document.createElement('select');
    repeatSelect.className = 'reminder-repeat-select';
    const repeatOptions = [
      { value: 'none', label: '不重复' },
      { value: 'daily', label: '每天' },
      { value: 'weekly', label: '每周' },
      { value: 'monthly', label: '每月' }
    ];
    repeatOptions.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt.value;
      o.textContent = opt.label;
      if (thought.reminder.repeat === opt.value) o.selected = true;
      repeatSelect.appendChild(o);
    });
    repeatRow.appendChild(repeatSelect);
    popup.appendChild(repeatRow);

    // Action buttons
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;justify-content:flex-end;';

    const btnRemove = document.createElement('button');
    btnRemove.className = 'card-popup-item';
    btnRemove.type = 'button';
    btnRemove.textContent = '移除';
    btnRemove.style.cssText = 'color:var(--danger);font-size:0.72rem;';
    btnRemove.addEventListener('click', (e) => {
      e.stopPropagation();
      thought.reminder = { enabled: false, datetime: null, repeat: 'none' };
      closePopup();
      persistAndRender();
    });

    const btnSave = document.createElement('button');
    btnSave.className = 'card-popup-item';
    btnSave.type = 'button';
    btnSave.textContent = '保存';
    btnSave.style.cssText = 'color:var(--accent-cyan);font-size:0.72rem;font-weight:600;';
    btnSave.addEventListener('click', (e) => {
      e.stopPropagation();
      thought.reminder.enabled = toggleInput.checked;
      if (dtInput.value) {
        thought.reminder.datetime = new Date(dtInput.value).toISOString();
      } else {
        thought.reminder.enabled = false;
        thought.reminder.datetime = null;
      }
      thought.reminder.repeat = repeatSelect.value;
      if (!thought.reminder.datetime) {
        thought.reminder.enabled = false;
      }
      closePopup();
      persistAndRender();
    });

    btnRow.appendChild(btnRemove);
    btnRow.appendChild(btnSave);
    popup.appendChild(btnRow);

    // Position
    document.body.appendChild(popup);
    const anchorRect = anchorEl.getBoundingClientRect();
    popup.style.position = 'fixed';
    popup.style.top = (anchorRect.bottom + 4) + 'px';
    popup.style.left = anchorRect.left + 'px';
    popup.style.zIndex = '9999';

    // Check right overflow
    requestAnimationFrame(() => {
      const popupRect = popup.getBoundingClientRect();
      if (popupRect.right > window.innerWidth - 10) {
        popup.style.left = 'auto';
        popup.style.right = '10px';
      }
      // Check bottom overflow
      if (popupRect.bottom > window.innerHeight - 10) {
        popup.style.top = 'auto';
        popup.style.bottom = '10px';
      }
    });

    activePopup = popup;

    // Close on click outside
    const closeHandler = (e) => {
      if (!popup.contains(e.target) && e.target !== anchorEl) {
        closePopup();
        document.removeEventListener('click', closeHandler);
      }
    };
    setTimeout(() => document.addEventListener('click', closeHandler), 10);
  }

  // ==================== 浮窗管理 / Popup Manager ====================
  let activePopup = null;

  function closePopup() {
    if (activePopup) {
      activePopup.remove();
      activePopup = null;
    }
  }

  function showPopup(anchorEl, items, onSelect) {
    closePopup();
    
    const popup = document.createElement('div');
    popup.className = 'card-popup';
    
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'card-popup-item' + (item.selected ? ' selected' : '');
      btn.type = 'button';
      
      if (item.pipColor) {
        const pip = document.createElement('span');
        pip.className = 'pip';
        pip.style.background = item.pipColor;
        btn.appendChild(pip);
      }
      
      const label = document.createTextNode(item.label);
      btn.appendChild(label);
      
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        onSelect(item.value);
        closePopup();
      });
      popup.appendChild(btn);
    });
    
    // Append to body, position using viewport coords
    document.body.appendChild(popup);
    
    const anchorRect = anchorEl.getBoundingClientRect();
    popup.style.position = 'fixed';
    popup.style.top = (anchorRect.bottom + 4) + 'px';
    popup.style.left = anchorRect.left + 'px';
    popup.style.zIndex = '9999';
    
    // Check right overflow
    requestAnimationFrame(() => {
      const popupRect = popup.getBoundingClientRect();
      if (popupRect.right > window.innerWidth - 10) {
        popup.style.left = 'auto';
        popup.style.right = '10px';
      }
    });
    
    activePopup = popup;
    
    // Close on click outside
    const closeHandler = (e) => {
      if (!popup.contains(e.target) && e.target !== anchorEl) {
        closePopup();
        document.removeEventListener('click', closeHandler);
      }
    };
    setTimeout(() => document.addEventListener('click', closeHandler), 10);
  }

  // ==================== DOM 引用 / DOM Refs ====================
  const $welcome     = document.getElementById('welcomeScreen');
  const $mainApp     = document.getElementById('mainApp');
  const $btnCreate   = document.getElementById('btnCreateFile');
  const $btnOpen     = document.getElementById('btnOpenFile');
  const $fileDot     = document.getElementById('fileDot');
  const $fileName    = document.getElementById('fileName');
  const $btnChange   = document.getElementById('btnChangeFile');
  const $input       = document.getElementById('thoughtInput');
  const $charCount   = document.getElementById('charCount');
  const $searchInput = document.getElementById('searchInput');
  const $thoughtList = document.getElementById('thoughtList');
  const $badgeAll    = document.getElementById('badgeAll');
  const $badgePending = document.getElementById('badgePending');
  const $badgeCompleted = document.getElementById('badgeCompleted');

  // ==================== 初始化 / Init ====================
  async function init() {
    const savedPath = localStorage.getItem(APP_STATE_KEY);
    if (savedPath) {
      try {
        filePath = savedPath;
        await loadFromFile();
        showMainApp();
        return;
      } catch (e) {
        console.warn('Failed to load saved file:', e);
        filePath = null;
      }
    }
    $welcome.style.display = 'flex';
  }

  // ==================== 文件操作 / File Operations ====================

  /** 创建新文件 */
  async function createNewFile() {
    try {
      const selected = await dialogSave({
        defaultPath: '我的想法.json',
        filters: [{ name: 'JSON 数据文件', extensions: ['json'] }]
      });
      if (!selected) return;
      filePath = selected;
      const initData = { version: 1, thoughts: [], customTags: [] };
      await writeTextFile(filePath, JSON.stringify(initData, null, 2));
      localStorage.setItem(APP_STATE_KEY, filePath);
      thoughts = [];
      showMainApp();
    } catch (e) {
      console.error('Failed to create file:', e);
    }
  }

  /** 打开已有文件 */
  async function openExistingFile() {
    try {
      const selected = await dialogOpen({
        multiple: false,
        filters: [{ name: 'JSON 数据文件', extensions: ['json'] }]
      });
      if (!selected) return;
      filePath = selected;
      localStorage.setItem(APP_STATE_KEY, filePath);
      await loadFromFile();
      showMainApp();
    } catch (e) {
      console.error('Failed to open file:', e);
    }
  }

  /** 从文件加载数据 */
  async function loadFromFile() {
    try {
      const text = await readTextFile(filePath);
      const data = JSON.parse(text);
      thoughts = data.thoughts || [];
      customTags = data.customTags || [];
      // Backward compat: ensure reminder field on every thought
      thoughts.forEach(t => {
        if (!t.reminder) {
          t.reminder = { enabled: false, datetime: null, repeat: 'none' };
        }
      });
      const name = filePath.split('/').pop() || filePath.split('\\').pop() || filePath;
      updateFileStatus(name);
    } catch (e) {
      console.error('Failed to read file:', e);
      thoughts = [];
    }
  }

  /** 写入文件 */
  async function writeToFile(data) {
    await writeTextFile(filePath, JSON.stringify(data, null, 2));
  }

  async function saveData() {
    if (!filePath) return;
    try {
      await writeToFile({ version: 1, thoughts: thoughts, customTags: customTags });
    } catch (e) {
      console.error('保存失败:', e);
    }
  }

  // ==================== 界面切换 / UI Switching ====================

  function showMainApp() {
    $welcome.style.display = 'none';
    $mainApp.style.display = 'block';
    document.getElementById('bottomBar').style.display = 'block';
    renderTagSelector();
    setupReminderButton();
    startReminderEngine();
    render();
    $input.focus();
  }

  function updateFileStatus(name) {
    $fileName.textContent = name || '未开卷';
    $fileDot.classList.toggle('connected', !!name);
  }

  // ==================== 想法操作 / Thought Operations ====================

  function addThought(content) {
    const trimmed = content.trim();
    if (!trimmed) return;

    const thought = {
      id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2),
      content: trimmed,
      createdAt: new Date().toISOString(),
      completedAt: null,
      priority: currentPriority,
      tag: currentTag,
      reminder: { enabled: currentReminder.enabled, datetime: currentReminder.datetime, repeat: currentReminder.repeat }
    };

    thoughts.unshift(thought);

    // Reset reminder state after adding
    currentReminder = { enabled: false, datetime: null, repeat: 'none' };
    // Also reset UI if reminder panel is open
    const reminderToggle = document.getElementById('reminderToggle');
    if (reminderToggle) reminderToggle.checked = false;
    const reminderDatetime = document.getElementById('reminderDatetime');
    if (reminderDatetime) reminderDatetime.value = '';
    const reminderRepeat = document.getElementById('reminderRepeat');
    if (reminderRepeat) reminderRepeat.value = 'none';
    // Update button visual state
    const reminderBtn = document.getElementById('btnReminder');
    if (reminderBtn) reminderBtn.classList.remove('reminder-active');

    persistAndRender();

    // 成功动画
    setTimeout(() => {
      const firstCard = $thoughtList.querySelector('.thought-card');
      if (firstCard) firstCard.classList.add('success-flash');
    }, 50);
  }

  function toggleThought(id) {
    const t = thoughts.find(x => x.id === id);
    if (!t) return;
    t.completedAt = t.completedAt ? null : new Date().toISOString();
    persistAndRender();
  }

  function deleteThought(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) {
      // 先播放删除动画
      card.style.animation = 'none';
      void card.offsetHeight; // 强制回流，清除旧动画状态
      card.style.animation = '';
      card.classList.add('removing');
      setTimeout(() => {
        thoughts = thoughts.filter(x => x.id !== id);
        persistAndRender();
      }, 260);
    } else {
      thoughts = thoughts.filter(x => x.id !== id);
      persistAndRender();
    }
  }

  function persistAndRender() {
    saveData();
    render();
  }

  // ==================== 渲染 / Rendering ====================

  function render() {
    const filtered = getFilteredThoughts();
    const pendingCount = thoughts.filter(t => !t.completedAt).length;
    const completedCount = thoughts.filter(t => t.completedAt).length;

    // 更新计数
    $badgeAll.textContent = thoughts.length;
    $badgePending.textContent = pendingCount;
    $badgeCompleted.textContent = completedCount;

    // 更新标签筛选器计数
    renderTagFilter();

    // 按视图渲染
    if (currentView === 'tags') {
      renderTagView();
      return;
    }

    // 渲染列表
    $thoughtList.innerHTML = '';

    if (filtered.length === 0) {
      const emptyEl = document.createElement('div');
      emptyEl.className = 'empty-state';
      if (thoughts.length === 0) {
        emptyEl.innerHTML = '';
        const icon = document.createElement('span');
        icon.className = 'empty-icon-cyber';
        icon.textContent = '⟨ ⟩';
        const text = document.createElement('div');
        text.className = 'empty-text';
        text.textContent = '落笔写下你的第一个念头';
        emptyEl.appendChild(icon);
        emptyEl.appendChild(text);
      } else {
        const text = document.createElement('div');
        text.className = 'empty-text';
        text.textContent = '翻遍全卷，未见此言';
        emptyEl.appendChild(text);
      }
      $thoughtList.appendChild(emptyEl);
      return;
    }

    filtered.forEach((thought, index) => {
      const card = createCardElement(thought, index);
      $thoughtList.appendChild(card);
    });
  }

  function createCardElement(thought, index) {
    const priority = thought.priority || 'q1';
    const priorityLabels = { q1: '急要', q2: '重要', q3: '紧急', q4: '闲记' };

    const card = document.createElement('article');
    card.className = 'thought-card' + (thought.completedAt ? ' completed' : '');
    card.dataset.id = thought.id;
    card.dataset.priority = priority;
    card.dataset.tag = thought.tag || 'Mine';
    card.setAttribute('role', 'listitem');
    card.style.animationDelay = Math.min(index * 30, 300) + 'ms';

    // Card tag header (small, subtle)
    const cardTagHeader = document.createElement('div');
    cardTagHeader.className = 'card-tag-header';
    cardTagHeader.textContent = thought.tag || 'Mine';
    card.appendChild(cardTagHeader);

    // 内容区
    const contentDiv = document.createElement('div');
    contentDiv.className = 'card-content';

    // 勾选按钮
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'btn-toggle' + (thought.completedAt ? ' checked' : '');
    toggleBtn.type = 'button';
    toggleBtn.setAttribute('aria-label', thought.completedAt ? '标记为未了' : '标记为了结');
    const checkIcon = document.createElement('span');
    checkIcon.className = 'check-icon';
    checkIcon.textContent = '✓';
    toggleBtn.appendChild(checkIcon);
    toggleBtn.addEventListener('click', () => toggleThought(thought.id));

    // 文本区
    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'card-body';
    const textP = document.createElement('div');
    textP.className = 'card-text';
    textP.textContent = thought.content; // XSS safe: textContent

    // 元信息
    const metaDiv = document.createElement('div');
    metaDiv.className = 'card-meta';
    const timeSpan = document.createElement('span');
    timeSpan.className = 'card-time';
    timeSpan.textContent = formatRelativeTime(thought.createdAt);

    // 优先级标签（可点击切换）
    const priorityTag = document.createElement('span');
    priorityTag.className = 'priority-tag ' + priority;
    priorityTag.textContent = priorityLabels[priority];
    priorityTag.title = '点击切换优先级';
    priorityTag.addEventListener('click', (e) => {
      e.stopPropagation();
      const current = thought.priority || 'q1';
      const priorityConfig = {
        q1: { label: '急要', color: '#ff4081' },
        q2: { label: '重要', color: '#00e5ff' },
        q3: { label: '紧急', color: '#ffab40' },
        q4: { label: '闲记', color: '#7a80a8' }
      };
      const items = ['q1', 'q2', 'q3', 'q4'].map(key => ({
        value: key,
        label: priorityConfig[key].label,
        pipColor: priorityConfig[key].color,
        selected: key === current
      }));
      showPopup(priorityTag, items, (val) => {
        thought.priority = val;
        persistAndRender();
      });
    });

    // 标签标签（可点击切换）
    const tagLabel = document.createElement('span');
    tagLabel.className = 'card-tag';
    tagLabel.dataset.cardTag = thought.tag || 'Mine';
    tagLabel.textContent = thought.tag || 'Mine';
    tagLabel.title = '点击切换标签';
    tagLabel.addEventListener('click', (e) => {
      e.stopPropagation();
      const current = thought.tag || 'Mine';
      const items = getAllTags().map(tag => ({
        value: tag,
        label: tag,
        selected: tag === current
      }));
      showPopup(tagLabel, items, (val) => {
        thought.tag = val;
        persistAndRender();
      });
    });

    // 删除区域
    const actionsDiv = document.createElement('div');
    actionsDiv.style.display = 'flex';
    actionsDiv.style.alignItems = 'center';
    actionsDiv.style.gap = '4px';

    const editBtn = document.createElement('button');
    editBtn.className = 'btn-edit';
    editBtn.type = 'button';
    editBtn.textContent = '✎';
    editBtn.setAttribute('aria-label', '编辑此念');

    editBtn.addEventListener('click', () => {
      const textarea = document.createElement('textarea');
      textarea.className = 'card-edit-area';
      textarea.value = thought.content;
      textarea.rows = 1;

      const editActions = document.createElement('div');
      editActions.className = 'card-edit-actions';
      const editIndicator = document.createElement('span');
      editIndicator.className = 'card-edit-indicator';
      editIndicator.textContent = 'EDITING';
      const btnSave = document.createElement('button');
      btnSave.className = 'btn-save-edit';
      btnSave.type = 'button';
      btnSave.textContent = '保存';
      const btnCancel = document.createElement('button');
      btnCancel.className = 'btn-cancel-edit';
      btnCancel.type = 'button';
      btnCancel.textContent = '取消';
      editActions.appendChild(editIndicator);
      editActions.appendChild(btnCancel);
      editActions.appendChild(btnSave);

      textP.style.display = 'none';
      metaDiv.style.display = 'none';
      absTime.style.display = 'none';
      bodyDiv.appendChild(textarea);
      bodyDiv.appendChild(editActions);
      textarea.focus();
      textarea.style.height = 'auto';
      textarea.style.height = Math.max(textarea.scrollHeight, 40) + 'px';
      textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.max(textarea.scrollHeight, 40) + 'px';
      });

      function restoreEdit() {
        textarea.remove();
        editActions.remove();
        textP.style.display = '';
        metaDiv.style.display = '';
        absTime.style.display = '';
      }

      btnSave.addEventListener('click', () => {
        const newContent = textarea.value.trim();
        if (!newContent) {
          restoreEdit();
          return;
        }
        thought.content = newContent;
        persistAndRender();
      });

      btnCancel.addEventListener('click', restoreEdit);

      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          btnSave.click();
        } else if (e.key === 'Escape') {
          btnCancel.click();
        }
      });
    });

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn-delete';
    deleteBtn.type = 'button';
    deleteBtn.textContent = '抹去';
    deleteBtn.setAttribute('aria-label', '抹去此念');

    // 行内确认
    const confirmDiv = document.createElement('div');
    confirmDiv.className = 'delete-confirm';
    const confirmText = document.createElement('span');
    confirmText.textContent = '当真?';
    const btnYes = document.createElement('button');
    btnYes.className = 'btn-confirm-yes';
    btnYes.type = 'button';
    btnYes.textContent = '然';
    const btnNo = document.createElement('button');
    btnNo.className = 'btn-confirm-no';
    btnNo.type = 'button';
    btnNo.textContent = '且慢';

    confirmDiv.appendChild(confirmText);
    confirmDiv.appendChild(btnYes);
    confirmDiv.appendChild(btnNo);

    deleteBtn.addEventListener('click', () => {
      deleteBtn.style.display = 'none';
      confirmDiv.classList.add('visible');
    });

    btnYes.addEventListener('click', () => deleteThought(thought.id));
    btnNo.addEventListener('click', () => {
      confirmDiv.classList.remove('visible');
      deleteBtn.style.display = '';
    });

    actionsDiv.appendChild(editBtn);
    actionsDiv.appendChild(deleteBtn);
    actionsDiv.appendChild(confirmDiv);

    // 左侧: 时间 + 优先级标签
    const metaLeft = document.createElement('div');
    metaLeft.style.display = 'flex';
    metaLeft.style.alignItems = 'center';
    metaLeft.style.gap = '6px';
    metaLeft.appendChild(timeSpan);
    metaLeft.appendChild(priorityTag);
    metaLeft.appendChild(tagLabel);

    // Reminder badge (if reminder enabled)
    if (thought.reminder && thought.reminder.enabled && thought.reminder.datetime) {
      const reminderBadge = document.createElement('span');
      reminderBadge.className = 'reminder-badge';
      reminderBadge.textContent = '⏰ ' + formatReminderDisplay(thought.reminder);
      reminderBadge.title = '点击编辑提醒';
      reminderBadge.addEventListener('click', (e) => {
        e.stopPropagation();
        showReminderEditor(reminderBadge, thought);
      });
      metaLeft.appendChild(reminderBadge);
    }

    metaDiv.appendChild(metaLeft);
    metaDiv.appendChild(actionsDiv);

    bodyDiv.appendChild(textP);
    bodyDiv.appendChild(metaDiv);

    // 绝对创建时间（右下角）
    const absTime = document.createElement('div');
    absTime.className = 'card-abs-time';
    absTime.textContent = formatAbsoluteTime(thought.createdAt);
    bodyDiv.appendChild(absTime);

    contentDiv.appendChild(toggleBtn);
    contentDiv.appendChild(bodyDiv);

    card.appendChild(contentDiv);
    return card;
  }

  // ==================== 过滤 / Filtering ====================

  function getFilteredThoughts() {
    let result = thoughts;

    // 按过滤条件
    if (currentFilter === 'pending') {
      result = result.filter(t => !t.completedAt);
    } else if (currentFilter === 'completed') {
      result = result.filter(t => t.completedAt);
    }

    // 按优先级筛选
    if (currentPriorityFilter !== 'all') {
      result = result.filter(t => (t.priority || 'q1') === currentPriorityFilter);
    }

    // 按标签筛选
    if (currentTagFilter !== 'all') {
      result = result.filter(t => (t.tag || 'Mine') === currentTagFilter);
    }

    // 按搜索
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      result = result.filter(t => t.content.toLowerCase().includes(q));
    }

    return result;
  }

  // ==================== 标签辅助 / Tag Helpers ====================

  function getAllTags() {
    return [].concat(['Team', 'AI', 'Coding', 'Mine'], customTags);
  }

  function renderTagSelector() {
    const container = document.getElementById('tagSelector');
    if (!container) return;
    container.querySelectorAll('.tag-btn').forEach(b => b.remove());
    const addBtn = document.getElementById('btnAddTag');
    getAllTags().forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn' + (tag === currentTag ? ' active' : '');
      btn.dataset.tag = tag;
      btn.type = 'button';
      btn.textContent = tag;
      btn.addEventListener('click', () => {
        currentTag = tag;
        container.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
      container.insertBefore(btn, addBtn);
    });
  }

  function renderTagFilter() {
    const container = document.getElementById('tagFilter');
    if (!container) return;
    container.innerHTML = '';

    // "全部" button
    const allBtn = document.createElement('button');
    allBtn.className = 'tfilter-btn' + (currentTagFilter === 'all' ? ' active' : '');
    allBtn.dataset.tf = 'all';
    allBtn.type = 'button';
    allBtn.textContent = '全部';
    allBtn.addEventListener('click', () => {
      currentTagFilter = 'all';
      renderTagFilter();
      render();
    });
    container.appendChild(allBtn);

    // Per-tag buttons with counts
    getAllTags().forEach(tag => {
      const count = thoughts.filter(t => (t.tag || 'Mine') === tag).length;
      const btn = document.createElement('button');
      btn.className = 'tfilter-btn' + (currentTagFilter === tag ? ' active' : '');
      btn.dataset.tf = tag;
      btn.type = 'button';

      const nameSpan = document.createTextNode(tag + ' ');
      btn.appendChild(nameSpan);

      const countSpan = document.createElement('span');
      countSpan.className = 'tfilter-count';
      countSpan.dataset.tfc = tag;
      countSpan.textContent = count;
      btn.appendChild(countSpan);

      btn.addEventListener('click', () => {
        currentTagFilter = tag;
        renderTagFilter();
        render();
      });
      container.appendChild(btn);
    });
  }

  function setupAddTagInline() {
    const addBtn = document.getElementById('btnAddTag');
    if (!addBtn) return;

    addBtn.addEventListener('click', () => {
      const container = document.getElementById('tagSelector');
      if (!container) return;

      // Replace + button with input
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'tag-add-input';
      input.placeholder = '标签名…';
      container.replaceChild(input, addBtn);
      input.focus();

      const restore = () => {
        if (input.parentNode) {
          container.replaceChild(addBtn, input);
        }
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const name = input.value.trim();
          if (name && !getAllTags().includes(name)) {
            customTags.push(name);
            currentTag = name;
            persistAndRender();
            renderTagSelector();
            restore();
          } else {
            restore();
          }
        } else if (e.key === 'Escape') {
          restore();
        }
      });

      input.addEventListener('blur', restore);
    });
  }

  // ==================== 标签视图渲染 / Tag View ====================

  function renderTagView() {
    $thoughtList.innerHTML = '';
    const allTags = getAllTags();
    const filtered = getFilteredThoughts();

    // Group by tag
    const groups = {};
    allTags.forEach(tag => { groups[tag] = []; });
    filtered.forEach(t => {
      const tag = t.tag || 'Mine';
      if (!groups[tag]) groups[tag] = [];
      groups[tag].push(t);
    });

    // Render each group that has items
    let hasItems = false;
    allTags.forEach(tag => {
      const items = groups[tag] || [];
      if (items.length === 0) return;
      hasItems = true;

      // Group header
      const header = document.createElement('div');
      header.className = 'tag-group-header';
      const tagName = document.createElement('span');
      tagName.className = 'tag-group-name';
      tagName.textContent = tag;
      const line = document.createElement('span');
      line.className = 'tag-group-line';
      const tagCount = document.createElement('span');
      tagCount.className = 'tag-group-count';
      tagCount.textContent = items.length;
      header.appendChild(tagName);
      header.appendChild(line);
      header.appendChild(tagCount);
      $thoughtList.appendChild(header);

      // Cards in this group
      items.forEach((thought, idx) => {
        const card = createCardElement(thought, idx);
        card.classList.add('in-tag-view');
        $thoughtList.appendChild(card);
      });
    });

    if (!hasItems) {
      const emptyEl = document.createElement('div');
      emptyEl.className = 'empty-state';
      const text = document.createElement('div');
      text.className = 'empty-text';
      text.textContent = thoughts.length === 0 ? '落笔写下你的第一个念头' : '翻遍全卷，未见此言';
      emptyEl.appendChild(text);
      $thoughtList.appendChild(emptyEl);
    }
  }

  // ==================== 时间格式化 / Time Formatting ====================

  function formatRelativeTime(isoStr) {
    const date = new Date(isoStr);
    const now = new Date();
    const diff = now - date;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);

    if (seconds < 60) return '刚刚';
    if (minutes < 60) return minutes + '分钟前';
    if (hours < 24) return hours + '小时前';
    if (days < 7) return days + '天前';

    // 超过7天显示日期
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const currentYear = now.getFullYear();
    return y === currentYear ? `${m}-${d}` : `${y}-${m}-${d}`;
  }

  /** 格式化绝对时间 */
  function formatAbsoluteTime(isoStr) {
    const d = new Date(isoStr);
    const y = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    const da = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    const now = new Date();
    const prefix = y === now.getFullYear() ? '' : y + '-';
    return prefix + mo + '-' + da + ' ' + h + ':' + mi;
  }

  // ==================== 自动增长文本框 / Auto-resize Textarea ====================

  function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 4.5 * 24) + 'px'; // ~3行
  }

  // ==================== 事件绑定 / Event Binding ====================

  // 欢迎页按钮
  $btnCreate.addEventListener('click', createNewFile);
  $btnOpen.addEventListener('click', openExistingFile);

  // 切换文件
  $btnChange.addEventListener('click', async () => {
    await openExistingFile();
  });

  // 输入框
  $input.addEventListener('input', () => {
    autoResize($input);
    $charCount.textContent = $input.value.length;
  });

  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const val = $input.value.trim();
      if (val) {
        addThought(val);
        $input.value = '';
        $charCount.textContent = '0';
        autoResize($input);
      }
    }
  });

  // 过滤器切换
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      currentFilter = tab.dataset.filter;
      render();
    });
  });

  // 优先级选择器切换（输入区）
  document.querySelectorAll('.priority-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPriority = btn.dataset.priority;
    });
  });

  // 优先级筛选切换
  document.querySelectorAll('.pfilter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pfilter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPriorityFilter = btn.dataset.pf;
      render();
    });
  });

  // 视图切换
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      render();
    });
  });

  // 标签选择器事件（输入区）
  document.querySelectorAll('#tagSelector .tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTag = btn.dataset.tag;
      document.querySelectorAll('#tagSelector .tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // 添加自定义标签 inline UI
  setupAddTagInline();

  // 搜索
  $searchInput.addEventListener('input', () => {
    searchQuery = $searchInput.value.trim();
    render();
  });

  // ==================== 提醒按钮 / Reminder Button ====================

  let reminderPanelVisible = false;

  function setupReminderButton() {
    const reminderBtn = document.getElementById('btnReminder');
    if (!reminderBtn) {
      // Layout agent hasn't added it yet; retry once after delay
      setTimeout(() => {
        const btn = document.getElementById('btnReminder');
        if (btn) attachReminderHandler(btn);
      }, 2000);
      return;
    }
    attachReminderHandler(reminderBtn);
  }

  function attachReminderHandler(btn) {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleReminderPanel(btn);
    });
  }

  function toggleReminderPanel(anchorEl) {
    const existing = document.getElementById('reminderPanel');
    if (existing) {
      existing.remove();
      reminderPanelVisible = false;
      return;
    }
    reminderPanelVisible = true;

    const panel = document.createElement('div');
    panel.id = 'reminderPanel';
    panel.className = 'reminder-panel';

    // Header
    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.8rem;color:var(--accent-cyan);margin-bottom:10px;font-weight:600;letter-spacing:0.05em;';
    header.textContent = '⏰ 设提醒';
    panel.appendChild(header);

    // Toggle row
    const toggleRow = document.createElement('div');
    toggleRow.className = 'reminder-panel-row';
    const toggleLabel = document.createElement('span');
    toggleLabel.className = 'reminder-panel-label';
    toggleLabel.textContent = '开启提醒';
    const toggleSwitch = document.createElement('label');
    toggleSwitch.className = 'reminder-toggle';
    const toggleInput = document.createElement('input');
    toggleInput.id = 'reminderToggle';
    toggleInput.type = 'checkbox';
    toggleInput.checked = currentReminder.enabled;
    const toggleSlider = document.createElement('span');
    toggleSlider.className = 'reminder-toggle-slider';
    toggleSwitch.appendChild(toggleInput);
    toggleSwitch.appendChild(toggleSlider);
    toggleRow.appendChild(toggleLabel);
    toggleRow.appendChild(toggleSwitch);
    panel.appendChild(toggleRow);

    // Datetime
    const dtRow = document.createElement('div');
    dtRow.className = 'reminder-panel-row';
    const dtLabel = document.createElement('span');
    dtLabel.className = 'reminder-panel-label';
    dtLabel.textContent = '提醒时间';
    const dtInput = document.createElement('input');
    dtInput.id = 'reminderDatetime';
    dtInput.type = 'datetime-local';
    dtInput.className = 'reminder-datetime-input';
    if (currentReminder.datetime) {
      const d = new Date(currentReminder.datetime);
      const localStr = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      dtInput.value = localStr;
    }
    dtRow.appendChild(dtLabel);
    dtRow.appendChild(dtInput);
    panel.appendChild(dtRow);

    // Repeat
    const repeatRow = document.createElement('div');
    repeatRow.className = 'reminder-panel-row';
    const repeatLabel = document.createElement('span');
    repeatLabel.className = 'reminder-panel-label';
    repeatLabel.textContent = '重复';
    const repeatSelect = document.createElement('select');
    repeatSelect.id = 'reminderRepeat';
    repeatSelect.className = 'reminder-repeat-select';
    const repeatOptions = [
      { value: 'none', label: '无' },
      { value: 'daily', label: '每天' },
      { value: 'weekly', label: '每周' },
      { value: 'monthly', label: '每月' }
    ];
    repeatOptions.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt.value;
      o.textContent = opt.label;
      if (currentReminder.repeat === opt.value) o.selected = true;
      repeatSelect.appendChild(o);
    });
    repeatRow.appendChild(repeatLabel);
    repeatRow.appendChild(repeatSelect);
    panel.appendChild(repeatRow);

    // Wire live updates
    toggleInput.addEventListener('change', () => {
      currentReminder.enabled = toggleInput.checked;
      updateReminderBtnState(anchorEl);
    });
    dtInput.addEventListener('change', () => {
      if (dtInput.value) {
        currentReminder.datetime = new Date(dtInput.value).toISOString();
        if (!toggleInput.checked) {
          toggleInput.checked = true;
          currentReminder.enabled = true;
        }
      } else {
        currentReminder.datetime = null;
      }
      updateReminderBtnState(anchorEl);
    });
    repeatSelect.addEventListener('change', () => {
      currentReminder.repeat = repeatSelect.value;
    });

    // Position below anchor
    document.body.appendChild(panel);
    const anchorRect = anchorEl.getBoundingClientRect();
    panel.style.position = 'fixed';
    panel.style.bottom = (window.innerHeight - anchorRect.top + 6) + 'px';
    panel.style.left = anchorRect.left + 'px';
    panel.style.zIndex = '9998';

    requestAnimationFrame(() => {
      const panelRect = panel.getBoundingClientRect();
      if (panelRect.right > window.innerWidth - 10) {
        panel.style.left = 'auto';
        panel.style.right = '10px';
      }
    });

    // Close on click outside
    const closeHandler = (e) => {
      if (!panel.contains(e.target) && e.target !== anchorEl) {
        panel.remove();
        reminderPanelVisible = false;
        document.removeEventListener('click', closeHandler);
      }
    };
    setTimeout(() => document.addEventListener('click', closeHandler), 10);
  }

  window._toggleReminder = function(el, e) {
    if (e) e.stopPropagation();
    toggleReminderPanel(el);
  };

  function updateReminderBtnState(btn) {
    if (currentReminder.enabled && currentReminder.datetime) {
      btn.classList.add('reminder-active');
    } else {
      btn.classList.remove('reminder-active');
    }
  }

  // ==================== 字体大小 / Font Size ====================
  const FONT_SIZE_KEY = 'flashmind_font_size';
  const FONT_MIN = 13, FONT_MAX = 22;
  let uiFontSize = parseInt(localStorage.getItem(FONT_SIZE_KEY)) || 16;

  function applyFontSize() {
    document.documentElement.style.setProperty('--ui-font-size', uiFontSize + 'px');
    const label = document.getElementById('fontSizeLabel');
    if (label) label.textContent = uiFontSize;
  }

  document.getElementById('btnFontDown').addEventListener('click', () => {
    if (uiFontSize > FONT_MIN) { uiFontSize--; applyFontSize(); localStorage.setItem(FONT_SIZE_KEY, uiFontSize); }
  });
  document.getElementById('btnFontUp').addEventListener('click', () => {
    if (uiFontSize < FONT_MAX) { uiFontSize++; applyFontSize(); localStorage.setItem(FONT_SIZE_KEY, uiFontSize); }
  });

  // ==================== 主题切换 / Theme Toggle ====================
  const THEME_KEY = 'flashmind_theme';

  function getPreferredTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) return saved;
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      return 'light';
    }
    return 'dark';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('btnThemeToggle');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }

  let currentTheme = getPreferredTheme();
  applyTheme(currentTheme);

  document.getElementById('btnThemeToggle').addEventListener('click', () => {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    applyTheme(currentTheme);
    localStorage.setItem(THEME_KEY, currentTheme);
  });

  applyFontSize();

  // ==================== 启动 / Boot ====================
  init();

})();
</script>

</html>
