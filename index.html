<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>闪念 — 心有所念，落笔成篇</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2300e5ff'/><stop offset='50%25' stop-color='%23448aff'/><stop offset='100%25' stop-color='%23b388ff'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%230a0a1a'/><text x='50' y='68' font-size='52' font-weight='bold' font-family='sans-serif' fill='url(%23g)' text-anchor='middle'>念</text></svg>">
<style>
/* ========== 设计令牌 / Design Tokens ========== */
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-tertiary: #1a1a3e;
  --text-primary: #e0e8ff;
  --text-secondary: #7a80a8;
  --accent-cyan: #00e5ff;
  --accent-blue: #448aff;
  --accent-purple: #b388ff;
  --accent-pink: #ea80fc;
  --gradient-main: linear-gradient(135deg, #00e5ff 0%, #448aff 50%, #b388ff 100%);
  --gradient-warm: linear-gradient(135deg, #448aff 0%, #b388ff 50%, #ea80fc 100%);
  --gradient-cool: linear-gradient(135deg, #00e5ff 0%, #448aff 100%);
  --success: #00e5ff;
  --danger: #ff4081;
  --border-subtle: rgba(100, 140, 255, 0.08);
  --shadow-card: 0 2px 12px rgba(0, 229, 255, 0.06), 0 0 1px rgba(0, 229, 255, 0.1);
  --glow-cyan: 0 0 20px rgba(0, 229, 255, 0.15);
  --glow-purple: 0 0 20px rgba(179, 136, 255, 0.15);
  --radius: 12px;
  --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --max-width: 960px;
  --ui-font-size: 16px;
}

/* ========== 浅色主题 / Light Theme ========== */
[data-theme="light"] {
  --bg-primary: #f0f2f8;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e4e7f0;
  --text-primary: #1a1a3e;
  --text-secondary: #5a6080;
  --border-subtle: rgba(80, 100, 160, 0.12);
  --shadow-card: 0 2px 8px rgba(30, 40, 80, 0.08), 0 0 1px rgba(30, 40, 80, 0.12);
  --glow-cyan: 0 0 16px rgba(0, 180, 220, 0.08);
  --glow-purple: 0 0 16px rgba(140, 100, 220, 0.08);
}

html { font-size: var(--ui-font-size); }

/* ========== 重置与基础 / Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-stack);
  background: var(--bg-primary);
  background-image: 
    radial-gradient(ellipse at 20% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(179, 136, 255, 0.03) 0%, transparent 50%);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  overflow-y: scroll;
}

/* ========== 滚动条 / Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

/* ========== 布局容器 / Layout ========== */
.app-container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 20px;
  padding-bottom: 200px; /* space for fixed bottom bar */
}

/* ========== 头部 / Header ========== */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-primary);
  padding-top: 18px;
  padding-bottom: 14px;
}

/* 头部渐变光晕 */
header::before {
  content: '';
  position: absolute;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 120px;
  background: radial-gradient(ellipse, rgba(0, 229, 255, 0.10) 0%, rgba(68, 138, 255, 0.06) 40%, transparent 70%);
  pointer-events: none;
  z-index: -1;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.header-top h1 {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: var(--gradient-main);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.file-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: var(--text-secondary);
}

.file-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-secondary);
  transition: background var(--transition);
}

.file-dot.connected { background: var(--accent-cyan); box-shadow: 0 0 6px rgba(0, 229, 255, 0.5); }

.btn-change-file {
  background: none;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-size: 0.75rem;
  padding: 3px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-stack);
}

.btn-change-file:hover {
  color: var(--accent-cyan);
  border-color: var(--accent-cyan);
}

/* ========== 输入区 / Input Area (moved to bottom bar) ========== */
.input-area {
  display: none; /* hidden — the input area is now in #bottomBar */
}

/* ========== 底部输入栏 / Bottom Input Bar ========== */
#bottomBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(10, 10, 26, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(0, 229, 255, 0.12);
  box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.3), 0 0 12px rgba(0, 229, 255, 0.06);
  padding: 12px 20px 16px;
}

.bottom-bar-inner {
  max-width: var(--max-width);
  margin: 0 auto;
}

.bottom-bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.bottom-bar-row:last-child {
  margin-bottom: 0;
}

.bottom-bar-label {
  font-size: 0.65rem;
  color: var(--text-secondary);
  opacity: 0.6;
  margin-right: 2px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

.bottom-bar-divider {
  color: rgba(0, 229, 255, 0.25);
  font-size: 1rem;
  line-height: 1;
  margin: 0 4px;
  flex-shrink: 0;
  user-select: none;
}

/* Compact priority selector in bottom bar */
#bottomBar .priority-selector {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
  flex-shrink: 0;
}
#bottomBar .priority-btn {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 5px;
  gap: 3px;
}
#bottomBar .priority-btn::before {
  width: 5px;
  height: 5px;
}

/* Compact tag selector in bottom bar */
#bottomBar .tag-selector {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
  flex-wrap: wrap;
  align-items: center;
  flex: 1;
  min-width: 0;
}
#bottomBar .tag-btn {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 14px;
}
#bottomBar .tag-btn-add {
  font-size: 0.75rem;
  padding: 1px 7px;
  border-radius: 14px;
}

/* Bottom bar textarea row */
.bottom-input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

.bottom-input-row textarea {
  flex: 1;
  min-width: 0;
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text-primary);
  font-family: var(--font-stack);
  font-size: 0.92rem;
  line-height: 1.5;
  resize: none;
  overflow-y: auto;
  max-height: 8em;
  min-height: 4.5em;
  outline: none;
  transition: border-color var(--transition);
}

.bottom-input-row textarea::placeholder { color: var(--text-secondary); }
.bottom-input-row textarea:focus {
  border-color: rgba(0, 229, 255, 0.4);
}

.bottom-input-hint {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-secondary);
  margin-top: 4px;
  opacity: 0;
  transition: opacity var(--transition);
}

#bottomBar:focus-within .bottom-input-hint { opacity: 1; }

.bottom-input-hint #charCount {
  color: var(--accent-cyan);
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
}

/* 设提醒 button */
.btn-reminder {
  background: transparent;
  border: 1px solid rgba(0, 229, 255, 0.2);
  color: var(--accent-cyan);
  font-size: 1rem;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  min-width: 32px;
  min-height: 32px;
}

.btn-reminder:hover {
  border-color: rgba(0, 229, 255, 0.5);
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.15);
}

.btn-reminder.reminder-active {
  border-color: rgba(0, 229, 255, 0.5);
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
  animation: reminderBtnGlow 3s ease-in-out infinite;
}

@keyframes reminderBtnGlow {
  0%, 100% { box-shadow: 0 0 6px rgba(0, 229, 255, 0.15); }
  50% { box-shadow: 0 0 14px rgba(0, 229, 255, 0.35); }
}

/* ========== 过滤器 / Filter Tabs ========== */
.filter-bar {
  display: flex;
  gap: 4px;
  background: var(--bg-secondary);
  border-radius: 10px;
  padding: 3px;
  flex: 1 1 auto;
  min-width: 240px;
}

.filter-tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-family: var(--font-stack);
  font-size: 0.82rem;
  font-weight: 500;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.filter-tab:hover { color: var(--text-primary); }

.filter-tab.active {
  background: rgba(0, 229, 255, 0.08);
  color: var(--accent-cyan);
}

.filter-badge {
  font-size: 0.7rem;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  padding: 1px 6px;
  border-radius: 8px;
  min-width: 18px;
  text-align: center;
  transition: all var(--transition);
}

.filter-tab.active .filter-badge {
  background: var(--gradient-main);
  color: #fff;
}

/* ========== 搜索 / Search ========== */
.search-area {
  flex: 1 1 auto;
  min-width: 120px;
  position: relative;
}

.search-area input {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 6px 10px 6px 28px;
  color: var(--text-primary);
  font-family: var(--font-stack);
  font-size: 0.82rem;
  outline: none;
  transition: border-color var(--transition);
}

.search-area input::placeholder { color: var(--text-secondary); }
.search-area input:focus { border-color: rgba(0, 229, 255, 0.4); }

.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 0.82rem;
  pointer-events: none;
}

.search-area input {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  padding: 6px 12px 6px 30px;
  color: var(--text-primary);
  font-family: var(--font-stack);
  font-size: 0.78rem;
  outline: none;
  transition: border-color var(--transition);
}

.search-area input::placeholder { color: var(--text-secondary); }
.search-area input:focus { border-color: rgba(0, 229, 255, 0.4); }

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 0.78rem;
  pointer-events: none;
}

/* ========== 想法卡片 / Thought Cards ========== */
.thought-list { display: flex; flex-direction: column; gap: 5px; }

.thought-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 8px 12px;
  position: relative;
  overflow: hidden;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), opacity var(--transition);
  animation: cardAppear 300ms cubic-bezier(0.4, 0, 0.2, 1) both;
}

/* 左侧彩色条 — 按标签着色 */
.thought-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--gradient-main);
  transition: background var(--transition);
}

.thought-card[data-tag="Team"]::before { background: #ff4081; }
.thought-card[data-tag="AI"]::before    { background: #00e5ff; }
.thought-card[data-tag="Coding"]::before{ background: #ffab40; }
.thought-card[data-tag="Mine"]::before  { background: var(--gradient-main); }

.thought-card.completed::before { opacity: 0.5; }

.thought-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-card), var(--glow-cyan);
  border-color: rgba(0, 229, 255, 0.15);
}

.thought-card.completed {
  opacity: 0.5;
  border-color: rgba(0, 229, 255, 0.05);
}

/* 卡片出现动画 */
@keyframes cardAppear {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 卡片删除动画 */
.thought-card.removing {
  animation: cardRemove 250ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes cardRemove {
  to { opacity: 0; transform: scale(0.95) translateX(20px); height: 0; padding: 0; margin: 0; border-width: 0; overflow: hidden; }
}

/* 卡片成功闪烁 */
.thought-card.success-flash {
  animation: successFlash 600ms ease;
}

@keyframes successFlash {
  0%   { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.3); }
  50%  { box-shadow: 0 0 0 6px rgba(0, 229, 255, 0.1); }
  100% { box-shadow: none; }
}

.card-content {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

/* 完成勾选按钮 */
.btn-toggle {
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--bg-tertiary);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  margin-top: 1px;
  padding: 0;
}

.btn-toggle:hover { border-color: var(--accent-cyan); }

.btn-toggle.checked {
  background: var(--gradient-main);
  border-color: transparent;
}

.btn-toggle .check-icon {
  display: none;
  color: #fff;
  font-size: 12px;
  line-height: 1;
}

.btn-toggle.checked .check-icon { display: block; }

.card-body { flex: 1; min-width: 0; }

.card-text {
  font-size: 0.95rem;
  line-height: 1.45;
  word-break: break-word;
  white-space: pre-wrap;
  transition: all var(--transition);
}

.thought-card.completed .card-text {
  text-decoration: line-through;
  text-decoration-color: var(--text-secondary);
  color: var(--text-secondary);
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.card-time {
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.card-abs-time {
  font-size: 0.65rem;
  color: var(--text-secondary);
  opacity: 0.45;
  text-align: right;
  margin-top: 0px;
}

.btn-delete {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.72rem;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all var(--transition);
  opacity: 0;
  font-family: var(--font-stack);
  line-height: 1;
}

.thought-card:hover .btn-delete { opacity: 1; }
.btn-delete:hover { color: var(--danger); background: rgba(255, 64, 129, 0.1); }

.btn-edit {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 2px 5px;
  border-radius: 4px;
  transition: all var(--transition);
  opacity: 0;
  font-family: var(--font-stack);
  line-height: 1;
}

.thought-card:hover .btn-edit { opacity: 1; }
.btn-edit:hover { color: var(--accent-cyan); background: rgba(0, 229, 255, 0.08); text-shadow: 0 0 6px rgba(0, 229, 255, 0.4); }

.card-edit-area {
  width: 100%;
  background: rgba(5, 5, 20, 0.95);
  border: 1px solid rgba(0, 229, 255, 0.15);
  border-left: 3px solid rgba(0, 229, 255, 0.7);
  border-radius: 4px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: var(--font-stack);
  font-size: 0.95rem;
  line-height: 1.45;
  resize: none;
  outline: none;
  min-height: 2em;
  position: relative;
  animation: editAreaAppear 200ms cubic-bezier(0.4, 0, 0.2, 1),
             editPulseLeft 2s ease-in-out infinite;
  box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.03),
              0 0 1px rgba(0, 229, 255, 0.2);
}

.card-edit-area:focus {
  border-color: rgba(0, 229, 255, 0.4);
  border-left-color: var(--accent-cyan);
  box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.05),
              0 0 8px rgba(0, 229, 255, 0.12);
}

@keyframes editAreaAppear {
  from { opacity: 0; transform: translateY(-2px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes editPulseLeft {
  0%, 100% { border-left-color: rgba(0, 229, 255, 0.5); }
  50% { border-left-color: rgba(0, 229, 255, 0.9); }
}

.card-edit-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-end;
  align-items: center;
}

/* Editing indicator — blinking dot */
.card-edit-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-right: auto;
  font-size: 0.6rem;
  color: var(--accent-cyan);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  opacity: 0.8;
}

.card-edit-indicator::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent-cyan);
  animation: editDotBlink 1s ease-in-out infinite;
  box-shadow: 0 0 4px rgba(0, 229, 255, 0.6);
}

@keyframes editDotBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.btn-save-edit, .btn-cancel-edit {
  background: transparent;
  border: 1px solid;
  padding: 3px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.72rem;
  font-family: var(--font-stack);
  font-weight: 500;
  transition: all var(--transition);
  letter-spacing: 0.03em;
}

.btn-save-edit {
  border-color: rgba(0, 229, 255, 0.35);
  color: var(--accent-cyan);
  background: rgba(0, 229, 255, 0.06);
}
.btn-save-edit:hover {
  background: rgba(0, 229, 255, 0.15);
  box-shadow: 0 0 10px rgba(0, 229, 255, 0.15),
              inset 0 0 6px rgba(0, 229, 255, 0.05);
  border-color: rgba(0, 229, 255, 0.6);
}

.btn-cancel-edit {
  border-color: rgba(122, 128, 168, 0.25);
  color: var(--text-secondary);
}
.btn-cancel-edit:hover {
  color: var(--text-primary);
  border-color: rgba(122, 128, 168, 0.5);
  background: rgba(122, 128, 168, 0.08);
}

/* 行内删除确认 */
.delete-confirm {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
}

.delete-confirm.visible { display: flex; }

.delete-confirm span { color: var(--text-secondary); }

.btn-confirm-yes, .btn-confirm-no {
  background: none;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.72rem;
  font-family: var(--font-stack);
  transition: all var(--transition);
}

.btn-confirm-yes { border-color: rgba(255, 64, 129, 0.3); color: var(--danger); }
.btn-confirm-yes:hover { background: rgba(255, 64, 129, 0.15); }
.btn-confirm-no:hover { color: var(--text-primary); }

/* ========== 空状态 / Empty States ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  display: block;
  filter: grayscale(0.3);
}

/* 赛博朋克空状态图标 */
.empty-icon-cyber {
  font-size: 2.5rem;
  margin-bottom: 16px;
  display: block;
  background: var(--gradient-main);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 12px rgba(0, 229, 255, 0.3));
  letter-spacing: 0.1em;
  font-weight: 300;
}

.empty-text {
  font-size: 1rem;
  color: var(--text-secondary);
}

.empty-sub {
  font-size: 0.8rem;
  color: var(--text-secondary);
  opacity: 0.6;
  margin-top: 8px;
}

/* ========== 欢迎屏 / Welcome Screen ========== */
.welcome-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: var(--bg-primary);
  background-image: 
    radial-gradient(ellipse at 30% 40%, rgba(0, 229, 255, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(179, 136, 255, 0.06) 0%, transparent 50%);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 400ms ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.welcome-card {
  text-align: center;
  max-width: 420px;
  padding: 40px 32px;
}

.welcome-card h2 {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 8px;
  background: var(--gradient-main);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 欢迎标题装饰线 */
.welcome-card h2::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  margin: 12px auto 0;
  background: var(--gradient-main);
  border-radius: 1px;
  box-shadow: var(--glow-cyan);
}

.welcome-card p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 32px;
  line-height: 1.6;
  text-wrap: balance;
  margin-left: auto;
  margin-right: auto;
}

.welcome-card p + p {
  margin-top: -24px;
  white-space: nowrap;
}

.welcome-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.btn-primary {
  background: var(--gradient-main);
  color: #fff;
  border: none;
  padding: 12px 32px;
  border-radius: 10px;
  font-family: var(--font-stack);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  min-width: 220px;
}

.btn-primary:hover { box-shadow: var(--glow-cyan); transform: translateY(-1px); }

.btn-secondary {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
  padding: 10px 28px;
  border-radius: 10px;
  font-family: var(--font-stack);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--transition);
  min-width: 220px;
}

.btn-secondary:hover {
  color: var(--accent-cyan);
  border-color: var(--accent-cyan);
}

/* ========== 降级模式提示 / Fallback Notice ========== */
.fallback-notice {
  background: rgba(0, 229, 255, 0.06);
  border: 1px solid rgba(0, 229, 255, 0.15);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.fallback-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.fallback-actions button {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-subtle);
  color: var(--text-primary);
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 0.75rem;
  cursor: pointer;
  font-family: var(--font-stack);
  transition: all var(--transition);
}

.fallback-actions button:hover { border-color: var(--accent-cyan); }

/* ========== 响应式 / Responsive ========== */
@media (max-width: 480px) {
  .app-container { padding: 0 12px; padding-bottom: 160px; }
  header { padding-top: 8px; }
  .header-top h1 { font-size: 1rem; }
  .thought-card { padding: 12px 14px; }
  .btn-delete { opacity: 0.6; }
  .welcome-card { padding: 32px 20px; }
  .welcome-card h2 { font-size: 1.6rem; }

  #bottomBar { padding: 8px 12px 10px; }
  #bottomBar .priority-btn { font-size: 0.62rem; padding: 2px 6px; }
  #bottomBar .tag-btn { font-size: 0.62rem; padding: 1px 6px; }
}

/* ========== 无障碍 / Accessibility ========== */
*:focus-visible {
  outline: 2px solid var(--accent-cyan);
  outline-offset: 2px;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ========== 优先级选择器 / Priority Selector ========== */
.priority-selector {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.priority-btn {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-size: 0.75rem;
  padding: 3px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-stack);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
}
.priority-btn::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.priority-btn.q1::before { background: #ff4081; }
.priority-btn.q2::before { background: #00e5ff; }
.priority-btn.q3::before { background: #ffab40; }
.priority-btn.q4::before { background: #7a80a8; }

.priority-btn.active {
  color: var(--text-primary);
}
.priority-btn.q1.active { border-color: rgba(255,64,129,0.5); background: rgba(255,64,129,0.1); }
.priority-btn.q2.active { border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.1); }
.priority-btn.q3.active { border-color: rgba(255,171,64,0.5); background: rgba(255,171,64,0.1); }
.priority-btn.q4.active { border-color: rgba(122,128,168,0.5); background: rgba(122,128,168,0.1); }

/* ========== 优先级标签 / Priority Tag ========== */
.priority-tag {
  font-size: 0.68rem;
  padding: 1px 8px;
  border-radius: 4px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}
.priority-tag:hover { filter: brightness(1.3); }
.priority-tag.q1 { color: #ff4081; background: rgba(255,64,129,0.1); border: 1px solid rgba(255,64,129,0.2); }
.priority-tag.q2 { color: #00e5ff; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); }
.priority-tag.q3 { color: #ffab40; background: rgba(255,171,64,0.1); border: 1px solid rgba(255,171,64,0.2); }
.priority-tag.q4 { color: #7a80a8; background: rgba(122,128,168,0.1); border: 1px solid rgba(122,128,168,0.2); }

/* ========== 优先级筛选 / Priority Filter ========== */
.priority-filter {
  display: flex;
  gap: 4px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.pfilter-btn {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-size: 0.72rem;
  padding: 3px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-stack);
  transition: all var(--transition);
}
.pfilter-btn.active { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.pfilter-btn[data-pf="q1"].active { border-color: rgba(255,64,129,0.4); color: #ff4081; }
.pfilter-btn[data-pf="q2"].active { border-color: rgba(0,229,255,0.4); color: #00e5ff; }
.pfilter-btn[data-pf="q3"].active { border-color: rgba(255,171,64,0.4); color: #ffab40; }
.pfilter-btn[data-pf="q4"].active { border-color: rgba(122,128,168,0.4); color: #7a80a8; }

/* ========== 桌面宽屏布局 / Desktop Wide Layout ========== */
.header-filters {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.header-row-main {
  display: flex;
  gap: 10px;
  align-items: center;
}

.header-row-filters {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

@media (min-width: 768px) {
  .header-filters {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-bar {
    flex: 1 1 auto;
    margin-bottom: 0;
    min-width: 240px;
  }
  .priority-filter { margin-bottom: 0; }
  .tag-filter { margin-bottom: 0; }

  .thought-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
}

/* ========== 标签选择器 / Tag Selector ========== */
.tag-selector {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.tag-btn {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-size: 0.75rem;
  padding: 3px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-stack);
  transition: all var(--transition);
}
.tag-btn.active {
  color: var(--accent-cyan);
  border-color: rgba(0, 229, 255, 0.5);
  background: rgba(0, 229, 255, 0.08);
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.1);
}
.tag-btn:hover {
  color: var(--text-primary);
  border-color: rgba(0, 229, 255, 0.3);
}
.tag-btn-add {
  background: transparent;
  border: 1px dashed rgba(0, 229, 255, 0.3);
  color: var(--accent-cyan);
  font-size: 0.85rem;
  padding: 2px 10px;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-stack);
  transition: all var(--transition);
}
.tag-btn-add:hover {
  background: rgba(0, 229, 255, 0.08);
  border-color: var(--accent-cyan);
}
.tag-add-input {
  background: var(--bg-tertiary);
  border: 1px solid rgba(0, 229, 255, 0.3);
  color: var(--text-primary);
  font-size: 0.75rem;
  padding: 3px 10px;
  border-radius: 20px;
  outline: none;
  width: 80px;
  font-family: var(--font-stack);
}
.tag-add-input::placeholder { color: var(--text-secondary); }

#bottomBar .tag-add-input {
  font-size: 0.68rem;
  padding: 2px 8px;
  width: 70px;
}

/* ========== 卡片标签 / Card Tag ========== */
.card-tag {
  font-size: 0.72rem;
  padding: 2px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: all var(--transition);
  margin-left: 2px;
  font-weight: 500;
}
.card-tag[data-card-tag="Team"]  { color: #ff4081; background: rgba(255,64,129,0.1); border: 1px solid rgba(255,64,129,0.2); }
.card-tag[data-card-tag="AI"]    { color: #00e5ff; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2); }
.card-tag[data-card-tag="Coding"]{ color: #ffab40; background: rgba(255,171,64,0.1); border: 1px solid rgba(255,171,64,0.2); }
.card-tag[data-card-tag="Mine"]  { color: var(--accent-purple); background: rgba(179,136,255,0.08); border: 1px solid rgba(179,136,255,0.2); }
.card-tag:hover {
  filter: brightness(1.3);
}

/* ========== 卡片内浮窗选择器 / Card Popup Picker ========== */
.card-popup {
  position: fixed;
  z-index: 9999;
  background: var(--bg-tertiary);
  border: 1px solid rgba(0, 229, 255, 0.15);
  border-radius: 8px;
  padding: 4px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 12px rgba(0, 229, 255, 0.08);
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 100px;
  animation: popupAppear 150ms cubic-bezier(0.2, 0, 0, 1.5);
}

@keyframes popupAppear {
  from { opacity: 0; transform: translateY(-4px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.card-popup-item {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 0.75rem;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-stack);
  text-align: left;
  transition: all 120ms ease;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-popup-item:hover {
  background: rgba(0, 229, 255, 0.08);
  color: var(--text-primary);
}
.card-popup-item.selected {
  color: var(--accent-cyan);
  background: rgba(0, 229, 255, 0.06);
}
.card-popup-item .pip {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ========== 卡片标签头 / Card Tag Header ========== */
.card-tag-header {
  font-size: 0.65rem;
  opacity: 0.6;
  margin-bottom: 3px;
  letter-spacing: 0.05em;
  display: none;
  text-transform: uppercase;
  font-weight: 600;
}
.thought-card[data-tag="Team"] .card-tag-header  { color: #ff4081; }
.thought-card[data-tag="AI"] .card-tag-header    { color: #00e5ff; }
.thought-card[data-tag="Coding"] .card-tag-header{ color: #ffab40; }
.thought-card[data-tag="Mine"] .card-tag-header  { color: var(--accent-purple); }
.thought-card.in-tag-view .card-tag-header { display: block; }

/* ========== 视图切换 / View Toggle ========== */
.view-toggle {
  display: flex;
  gap: 0;
  border: 1px solid var(--border-subtle);
  border-radius: 8px;
  overflow: hidden;
}
.view-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 0.75rem;
  padding: 4px 12px;
  cursor: pointer;
  font-family: var(--font-stack);
  transition: all var(--transition);
}
.view-btn.active {
  background: rgba(0, 229, 255, 0.08);
  color: var(--accent-cyan);
}

/* ========== 标签分组头部 / Tag Group Header ========== */
.tag-group-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 0 8px;
  margin-top: 12px;
  break-inside: avoid;
}
.tag-group-header:first-child { margin-top: 0; padding-top: 4px; }
.tag-group-name {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--accent-purple);
  white-space: nowrap;
  letter-spacing: 0.03em;
}
.tag-group-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(179, 136, 255, 0.3), transparent);
}
.tag-group-count {
  font-size: 0.72rem;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  padding: 1px 10px;
  border-radius: 10px;
  border: 1px solid rgba(179, 136, 255, 0.15);
  white-space: nowrap;
}

/* ========== 标签筛选 / Tag Filter ========== */
.tag-filter {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 6px;
}
.tfilter-btn {
  background: transparent;
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-size: 0.72rem;
  padding: 3px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-stack);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
}
.tfilter-btn.active {
  color: var(--accent-purple);
  border-color: rgba(179, 136, 255, 0.4);
  background: rgba(179, 136, 255, 0.08);
}
.tfilter-count {
  font-size: 0.65rem;
  color: var(--text-secondary);
  background: var(--bg-tertiary);
  padding: 0 5px;
  border-radius: 8px;
}

/* ========== 提醒徽章 / Reminder Badge ========== */
.reminder-badge {
  font-size: 0.68rem;
  padding: 1px 8px;
  border-radius: 10px;
  color: var(--accent-cyan);
  background: rgba(0, 229, 255, 0.08);
  border: 1px solid rgba(0, 229, 255, 0.2);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  text-shadow: 0 0 6px rgba(0, 229, 255, 0.3);
  animation: reminderPulse 3s ease-in-out infinite;
}
.reminder-badge:hover {
  background: rgba(0, 229, 255, 0.15);
  border-color: rgba(0, 229, 255, 0.4);
  box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
}

@keyframes reminderPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* ========== 提醒面板 / Reminder Panel ========== */
.reminder-panel {
  background: var(--bg-tertiary);
  border: 1px solid rgba(0, 229, 255, 0.2);
  border-radius: 10px;
  padding: 14px 16px;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 16px rgba(0, 229, 255, 0.08);
  min-width: 240px;
  animation: popupAppear 150ms cubic-bezier(0.2, 0, 0, 1.5);
}
.reminder-panel-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.reminder-panel-row:last-child {
  margin-bottom: 0;
}
.reminder-panel-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  flex-shrink: 0;
}

/* ========== 提醒开关 / Reminder Toggle ========== */
.reminder-toggle {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}
.reminder-toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}
.reminder-toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  transition: all var(--transition);
}
.reminder-toggle-slider::before {
  content: '';
  position: absolute;
  height: 14px;
  width: 14px;
  left: 2px;
  bottom: 2px;
  background: var(--text-secondary);
  border-radius: 50%;
  transition: all var(--transition);
}
.reminder-toggle input:checked + .reminder-toggle-slider {
  background: rgba(0, 229, 255, 0.15);
  border-color: rgba(0, 229, 255, 0.4);
  box-shadow: 0 0 8px rgba(0, 229, 255, 0.15);
}
.reminder-toggle input:checked + .reminder-toggle-slider::before {
  background: var(--accent-cyan);
  box-shadow: 0 0 6px rgba(0, 229, 255, 0.5);
  transform: translateX(16px);
}

/* ========== 提醒日期选择器 / Reminder Datetime Input ========== */
.reminder-datetime-input {
  background: var(--bg-secondary);
  border: 1px solid rgba(0, 229, 255, 0.15);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-stack);
  font-size: 0.75rem;
  padding: 4px 8px;
  outline: none;
  transition: border-color var(--transition);
  width: 100%;
  max-width: 160px;
}
.reminder-datetime-input:focus {
  border-color: rgba(0, 229, 255, 0.4);
  box-shadow: 0 0 6px rgba(0, 229, 255, 0.1);
}
::-webkit-calendar-picker-indicator {
  filter: invert(0.7) sepia(1) hue-rotate(150deg);
}

/* ========== 提醒重复选择 / Reminder Repeat Select ========== */
.reminder-repeat-select {
  background: var(--bg-secondary);
  border: 1px solid rgba(179, 136, 255, 0.15);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: var(--font-stack);
  font-size: 0.75rem;
  padding: 4px 8px;
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition);
}
.reminder-repeat-select:focus {
  border-color: rgba(179, 136, 255, 0.4);
  box-shadow: 0 0 6px rgba(179, 136, 255, 0.1);
}

/* ========== 提醒编辑器弹窗 / Reminder Editor Popup ========== */
.reminder-editor-popup {
  background: var(--bg-tertiary);
  border-color: rgba(0, 229, 255, 0.2);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), 0 0 16px rgba(0, 229, 255, 0.08);
}
.reminder-editor-popup .reminder-datetime-input {
  max-width: 100%;
}

/* ========== 提醒按钮激活态 / Reminder Button Active ========== */
.reminder-active {
  color: var(--accent-cyan) !important;
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
}

/* ========== 浅色主题覆盖 / Light Theme Overrides ========== */
[data-theme="light"] body {
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(0, 229, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(179, 136, 255, 0.04) 0%, transparent 50%);
}

/* Scrollbar */
[data-theme="light"] ::-webkit-scrollbar-track { background: rgba(0,0,0,0.03); }
[data-theme="light"] ::-webkit-scrollbar-thumb { background: #b8bdd0; border-radius: 3px; }
[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

/* Header glow */
[data-theme="light"] header::before {
  background: radial-gradient(ellipse, rgba(0, 180, 220, 0.08) 0%, rgba(68, 138, 255, 0.04) 40%, transparent 70%);
}

/* File dot */
[data-theme="light"] .file-dot.connected {
  box-shadow: 0 0 6px rgba(0, 200, 240, 0.4);
}

/* Bottom bar - frosted white glass */
[data-theme="light"] #bottomBar {
  background: rgba(240, 242, 248, 0.88);
  border-top: 1px solid rgba(80, 100, 160, 0.12);
  box-shadow: 0 -4px 24px rgba(30, 40, 80, 0.08), 0 0 8px rgba(0, 180, 220, 0.04);
}

/* Bottom bar divider */
[data-theme="light"] .bottom-bar-divider {
  color: rgba(80, 100, 160, 0.2);
}

/* Bottom bar input focus */
[data-theme="light"] .bottom-input-row textarea:focus {
  border-color: rgba(0, 180, 220, 0.4);
}

/* Char count glow */
